# File: docker-compose.yml

version: '3.8'

services:
  # Serviço do Servidor do Jogo
  server:
    build:
      # Contexto: A pasta raiz do projeto (.), para que o Docker tenha acesso a todos os pacotes (game, server, user, cmd).
      context: .
      # Caminho para o Dockerfile do servidor, relativo ao contexto.
      dockerfile: ./server/server.Dockerfile
    container_name: cardgame_server
    ports:
      # Mapeia a porta 8080 do container para a porta 8080 da sua máquina, permitindo a conexão externa.
      - "8080:8080"
    networks:
      # Conecta o servidor à nossa rede virtual para que outros containers possam encontrá-lo.
      - cardgame-net

  # Serviço do Cliente do Jogo (para uso interativo)
  client:
    build:
      context: .
      # Caminho para o Dockerfile do cliente.
      dockerfile: ./user/client.Dockerfile
    container_name: cardgame_client
    networks:
      - cardgame-net
    # Garante que o container do servidor seja iniciado antes do cliente tentar se conectar.
    depends_on:
      - server
    # Mantém o terminal aberto para você digitar comandos.
    stdin_open: true
    # Aloca um pseudo-terminal para a sessão interativa.
    tty: true

  # Serviço para rodar os Testes Automatizados
  tests:
    build:
      context: .
      # Caminho para o Dockerfile dos testes.
      dockerfile: ./Test_files/tests.Dockerfile
    container_name: cardgame_tests
    networks:
      - cardgame-net
    depends_on:
      - server

# Define a rede customizada para os containers se comunicarem
networks:
  cardgame-net:
    driver: bridge